name: Release ResourcePack

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number in SemVer format (x.y.z), without v prefix'
        required: true
      pack_game_version:
        description: 'Optional GTNH version list (SemVer values separated by ;)'
        required: false
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release metadata
        shell: bash
        run: |
          set -euo pipefail

          semver_regex='^[0-9]+\.[0-9]+\.[0-9]+$'
          semver_title_regex='^v?[0-9]+\.[0-9]+\.[0-9]+$'
          semver_seg='([0-9]+|[Xx])'
          semver_list_regex="^${semver_seg}\.${semver_seg}\.${semver_seg}([[:space:]]*;[[:space:]]*${semver_seg}\.${semver_seg}\.${semver_seg})*$"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            PR_TITLE="$(echo "${{ github.event.pull_request.title }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [[ ! "$PR_TITLE" =~ $semver_title_regex ]]; then
              echo "PR title '$PR_TITLE' is not a release version, skipping release."
              exit 0
            fi
            VERSION="${PR_TITLE#v}"
          fi

          if [[ ! "$VERSION" =~ $semver_regex ]]; then
            echo "Version '$VERSION' is not valid SemVer (x.y.z)."
            exit 1
          fi

          PACK_GAME_VERSION="$(jq -r '.gtnh_resource_pack_updater.pack_game_version' pack.mcmeta)"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.pack_game_version }}" ]]; then
            PACK_GAME_VERSION="${{ github.event.inputs.pack_game_version }}"
          fi

          PACK_GAME_VERSION="$(echo "$PACK_GAME_VERSION" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [[ ! "$PACK_GAME_VERSION" =~ $semver_list_regex ]]; then
            echo "pack_game_version '$PACK_GAME_VERSION' must be SemVer list separated by ';' (example: 2.8.0;2.8.1 or 2.9.X)."
            exit 1
          fi

          echo "RELEASE=true" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PACK_GAME_VERSION=$PACK_GAME_VERSION" >> "$GITHUB_ENV"

          echo "Using version: $VERSION"
          echo "Using pack_game_version: $PACK_GAME_VERSION"

      - name: Sync pack.mcmeta with release version
        if: env.RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          jq \
            --arg version "${VERSION}" \
            --arg packGameVersion "${PACK_GAME_VERSION}" \
            '
            .gtnh_resource_pack_updater.pack_version = $version
            | .gtnh_resource_pack_updater.pack_game_version = $packGameVersion
            | .pack.description |= if test("§bv[0-9]+\\.[0-9]+\\.[0-9]+")
                then sub("§bv[0-9]+\\.[0-9]+\\.[0-9]+"; "§bv" + $version)
                else .
              end
            ' \
            pack.mcmeta > pack.mcmeta.tmp

          mv pack.mcmeta.tmp pack.mcmeta
          cat pack.mcmeta

      - name: Create zip archive
        if: env.RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ZIP_NAME="GTNH-GregTech-ru_RU-${VERSION}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          zip -r "$ZIP_NAME" assets pack.mcmeta pack.png

      - name: Generate release JSON
        if: env.RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat <<EOF > gtnh-pack-update.json
          {
            "schema": 1,
            "pack_game_version": "${PACK_GAME_VERSION}",
            "pack_version": "${VERSION}"
          }
          EOF

          cat gtnh-pack-update.json

      - name: Generate release notes
        if: env.RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "## Release ${VERSION}" > RELEASE.md
          echo "" >> RELEASE.md
          echo "### Translation changes" >> RELEASE.md

          if PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)"; then
            DIFF_BASE="$PREV_TAG"
          else
            DIFF_BASE="$(git hash-object -t tree /dev/null)"
          fi

          git diff "$DIFF_BASE" HEAD -- assets/ | awk '
            /^diff --git/ { file=$3; sub(/^a\//, "", file) }
            /^\+gt\./ { added[file]++ }
            /^-gt\./ { removed[file]++ }
            END {
              for (f in added) seen[f]=1
              for (f in removed) seen[f]=1
              for (f in seen) {
                n = split(f, parts, "/")
                addon = parts[2]
                a = (f in added) ? added[f] : 0
                r = (f in removed) ? removed[f] : 0
                print "- **" addon "**: +" a " / -" r " keys"
              }
            }
          ' | sort >> RELEASE.md

          if [[ $(wc -l < RELEASE.md) -le 3 ]]; then
            echo "- no lang file changes detected" >> RELEASE.md
          fi

          cat RELEASE.md

      - name: Create GitHub Release
        if: env.RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.VERSION }}"
          target_commitish: "${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          body_path: RELEASE.md
          files: |
            ${{ env.ZIP_NAME }}
            gtnh-pack-update.json
